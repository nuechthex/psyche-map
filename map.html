<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psyche Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');
:root{--bg:#0a0a0f;--text:#e8e0d5;--dim:#8a8070;--gold:#c9a84c;--gold-s:#e8d5a3;--primary:#4a7c6a;--accent:#c9a84c;--surface:rgba(201,168,76,.04);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden;}

/* ── ambient layers ── */
#mist-layer,#aurora-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.mist-blob{position:absolute;border-radius:50%;filter:blur(70px);animation:mistDrift var(--speed) ease-in-out infinite alternate;}
@keyframes mistDrift{from{transform:translate(var(--tx1),var(--ty1));}to{transform:translate(var(--tx2),var(--ty2));}}
.aurora-ribbon{position:absolute;pointer-events:none;filter:blur(22px);animation:auroraShift var(--speed) ease-in-out infinite alternate;opacity:0;}
@keyframes auroraShift{0%{transform:translateX(var(--ax1));opacity:0;}30%{opacity:1;}70%{opacity:.7;}100%{transform:translateX(var(--ax2));opacity:0;}}

/* ── stars ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:1;}
.star{position:absolute;border-radius:50%;background:white;animation:tw var(--d) ease-in-out infinite var(--dl);}
@keyframes tw{0%,100%{opacity:var(--lo);}50%{opacity:var(--hi);}}

/* ── node animations ── */
@keyframes sp{0%,100%{opacity:.28;}50%{opacity:.65;}}
.sp-pulse{animation:sp 4.5s ease-in-out infinite;}
@keyframes nodeBreathe{0%,100%{transform:scale(1);}50%{transform:scale(1.024);}}
.node-circle{transform-box:fill-box;transform-origin:center;animation:nodeBreathe 6s ease-in-out infinite;}
.node-g{transform-box:fill-box;transform-origin:center;transition:opacity .7s ease,transform .7s ease;cursor:pointer;}
.node-g.entering{opacity:0;transform:scale(.55);}
@keyframes connPulse{0%,100%{opacity:var(--lo);}50%{opacity:var(--hi);}}
.conn-line{animation:connPulse var(--speed) ease-in-out infinite var(--dl);}

/* ── page ── */
.page{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:3rem 1.5rem 6rem;opacity:0;transition:opacity 1.1s ease;}
.page.in{opacity:1;}
.hdr{text-align:center;margin-bottom:4rem;}
.hdr h1{font-family:'Cinzel',serif;font-size:clamp(1.1rem,4vw,1.9rem);font-weight:400;letter-spacing:.35em;color:var(--gold);margin-bottom:.5rem;}
.hdr p{font-size:.88rem;font-style:italic;color:var(--dim);letter-spacing:.12em;}
.view-badge{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.35em;color:var(--dim);opacity:.55;display:block;margin-top:.5rem;}

/* ── myth ── */
.myth{border-left:2px solid var(--gold);padding:1.6rem 1.8rem;background:var(--surface);margin-bottom:4rem;position:relative;}
.myth::before{content:'✦';position:absolute;top:-.65rem;left:-.55rem;color:var(--gold);background:var(--bg);font-size:.9rem;padding:0 .2rem;}
.myth-lbl{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.35em;color:var(--gold);display:block;margin-bottom:.8rem;}
.myth p{font-size:1rem;font-style:italic;line-height:1.9;color:var(--gold-s);}

/* ── section headers ── */
.sec{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.4em;color:var(--dim);text-align:center;margin:3rem 0 1.5rem;position:relative;}
.sec::before,.sec::after{content:'';position:absolute;top:50%;width:28%;height:1px;background:linear-gradient(to right,transparent,rgba(138,128,112,.25));}
.sec::before{right:53%;}
.sec::after{left:53%;background:linear-gradient(to left,transparent,rgba(138,128,112,.25));}

/* ── map ── */
.map-wrap{width:100%;margin-bottom:1rem;}
.map-wrap svg{width:100%;height:auto;display:block;}

/* ── node panel ── */
.node-panel{overflow:hidden;opacity:0;max-height:0;transition:max-height .55s ease,opacity .4s ease,margin-bottom .55s ease;margin-bottom:0;border-left:2px solid var(--primary);padding:0;pointer-events:none;}
.node-panel.open{opacity:1;max-height:900px;margin-bottom:2.5rem;pointer-events:auto;padding:0 0 .5rem;}
.np-inner{padding:1.6rem 1.8rem 1.4rem;}
.np-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.4rem;}
.np-type{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.35em;color:var(--primary);display:block;margin-bottom:.3rem;}
.np-name{font-size:1.15rem;font-weight:400;color:var(--text);line-height:1.3;}
.np-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.9rem;opacity:.5;transition:opacity .2s;padding:.2rem .4rem;flex-shrink:0;}
.np-close:hover{opacity:1;}
.np-desc{font-size:.9rem;font-style:italic;color:var(--dim);line-height:1.75;margin-bottom:1.6rem;}
.np-prompts{margin-bottom:1.6rem;}
.np-prompt-lbl{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.35em;color:var(--dim);opacity:.6;margin-bottom:.8rem;display:block;}
.np-prompt{font-size:.85rem;font-style:italic;color:var(--dim);line-height:1.7;padding:.5rem 0;border-bottom:1px solid rgba(138,128,112,.08);cursor:pointer;transition:color .2s;}
.np-prompt:hover{color:var(--text);}
.np-prompt:last-child{border-bottom:none;}
.np-journal-lbl{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.35em;color:var(--dim);opacity:.6;margin-bottom:.6rem;display:block;}
.np-journal-ta{width:100%;background:rgba(255,255,255,.02);border:none;border-bottom:1px solid rgba(138,128,112,.15);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:.95rem;line-height:1.8;padding:.5rem .1rem .8rem;resize:none;outline:none;min-height:80px;overflow-y:hidden;transition:border-color .3s;}
.np-journal-ta:focus{border-bottom-color:rgba(201,168,76,.28);}
.np-journal-actions{margin-top:.8rem;display:flex;align-items:center;gap:1rem;}
.np-save{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.35em;color:var(--gold);background:none;border:none;cursor:pointer;opacity:.5;transition:opacity .3s;text-transform:uppercase;}
.np-save:hover,.np-save.ready{opacity:1;}
.np-saved{font-size:.7rem;font-style:italic;color:var(--dim);opacity:0;transition:opacity .4s;}
.np-saved.show{opacity:.6;}

/* ── cards ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1rem;}
@media(max-width:520px){.grid{grid-template-columns:1fr;}}
.card{padding:1.2rem 1.4rem 1.2rem 1.6rem;position:relative;overflow:hidden;border-radius:1px;border:1px solid rgba(138,128,112,.1);transition:transform .25s,box-shadow .25s;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.45);}
.card::before{content:'';position:absolute;inset:0;background:var(--c);opacity:.05;transition:opacity .25s;}
.card:hover::before{opacity:.1;}
.cb{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c);opacity:.85;}
.cl{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.22em;color:var(--c);display:block;margin-bottom:.3rem;}
.ct{font-size:1rem;font-weight:400;margin-bottom:.4rem;color:var(--text);line-height:1.3;}
.cd{font-size:.82rem;font-style:italic;color:var(--dim);line-height:1.6;}
.tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem;}
.tag{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:.12rem .45rem;border:1px solid var(--c);border-radius:20px;color:var(--c);opacity:.65;}

/* ── editable fields ── */
.field-editable{position:relative;}
.edit-btn{position:absolute;top:0;right:0;background:none;border:none;color:var(--dim);cursor:pointer;font-size:.75rem;opacity:0;transition:opacity .2s;padding:.1rem .3rem;line-height:1;}
.field-editable:hover .edit-btn{opacity:.55;}
.edit-btn:hover{opacity:1 !important;}
.edit-active .edit-btn{display:none;}
.edit-ta{width:100%;background:rgba(255,255,255,.02);border:none;border-bottom:1px solid rgba(138,128,112,.2);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:.85rem;font-style:italic;line-height:1.7;padding:.3rem .1rem .6rem;resize:none;outline:none;min-height:60px;overflow-y:hidden;transition:border-color .3s;display:block;width:100%;}
.edit-ta:focus{border-bottom-color:rgba(201,168,76,.3);}
.edit-actions{display:flex;gap:1rem;margin-top:.5rem;align-items:center;}
.edit-save,.edit-cancel{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.3em;background:none;border:none;cursor:pointer;opacity:.6;transition:opacity .2s;text-transform:uppercase;}
.edit-save{color:var(--gold);}
.edit-save:hover{opacity:1;}
.edit-cancel{color:var(--dim);}
.edit-cancel:hover{opacity:1;}

/* ── five words ── */
.five{display:flex;justify-content:center;flex-wrap:wrap;gap:.8rem;margin:1.5rem 0 3rem;}
.fw{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.28em;color:var(--gold);padding:.35rem .9rem;border:1px solid rgba(201,168,76,.3);cursor:pointer;transition:border-color .25s,background .25s;}
.fw:hover{border-color:rgba(201,168,76,.6);background:rgba(201,168,76,.04);}
.fw-input{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.25em;color:var(--gold);background:none;border:none;border-bottom:1px solid rgba(201,168,76,.4);outline:none;width:90px;text-align:center;padding:.2rem;}

/* ── actions ── */
.actions{text-align:center;margin-top:3rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;}
.btn-gold{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.35em;color:var(--gold);border:1px solid rgba(201,168,76,.28);background:none;padding:.9rem 2.6rem;cursor:pointer;transition:border-color .35s,background .35s;text-transform:uppercase;}
.btn-gold:hover{border-color:rgba(201,168,76,.65);background:rgba(201,168,76,.05);}
.io-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
.btn-io{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.32em;color:var(--dim);border:1px solid rgba(138,128,112,.2);background:none;padding:.7rem 1.8rem;cursor:pointer;transition:border-color .3s,color .3s;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;}
.btn-io:hover{border-color:rgba(138,128,112,.55);color:var(--text);}
.btn-return{color:var(--gold);border-color:rgba(201,168,76,.25);}
.btn-return:hover{border-color:rgba(201,168,76,.6);color:var(--gold);}
.restart{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.4em;color:var(--dim);text-decoration:none;border-bottom:1px solid rgba(138,128,112,.2);padding-bottom:.1rem;opacity:.4;transition:opacity .3s;text-transform:uppercase;}
.restart:hover{opacity:.8;}

/* ── context output ── */
.ctx-wrap{display:none;width:100%;max-width:640px;margin-top:1.5rem;text-align:left;}
.ctx-wrap.open{display:block;}
.ctx-box{background:rgba(0,0,0,.35);border:1px solid rgba(138,128,112,.18);padding:1.2rem;font-size:.68rem;font-family:'Courier New',monospace;color:var(--dim);line-height:1.65;white-space:pre-wrap;max-height:340px;overflow-y:auto;}
.copy-note{font-size:.7rem;font-style:italic;color:var(--dim);opacity:.5;margin-top:.6rem;text-align:center;}
/* ── card illustrations ── */
.card-illo{width:100%;border-bottom:1px solid rgba(255,255,255,.05);overflow:hidden;border-radius:1px 1px 0 0;}
.card-illo svg{width:100%;display:block;}
.card-text{padding:1.2rem 1.4rem 1.2rem 1.6rem;}
</style>
</head>
<body>
<div id="mist-layer"></div>
<div id="aurora-layer"></div>
<div id="stars"></div>

<div class="page" id="page">
  <div class="hdr">
    <h1 id="pageTitle">PSYCHE MAP</h1>
    <p>a cartography of the interior world</p>
    <span class="view-badge" id="viewBadge" hidden>viewing only</span>
  </div>

  <div class="myth">
    <span class="myth-lbl">THE MYTH</span>
    <div class="field-editable" data-key="myth_override" id="mythEditable">
      <p id="mythText" class="cd" style="font-size:1rem;color:var(--gold-s);line-height:1.9;font-style:italic;margin:0;"></p>
      <button class="edit-btn" title="Edit myth">✏</button>
    </div>
  </div>

  <div class="sec">RELATIONSHIP MAP</div>
  <div class="map-wrap" id="mapWrap"></div>

  <div class="node-panel" id="nodePanel">
    <div class="np-inner">
      <div class="np-header">
        <div>
          <span class="np-type" id="npType"></span>
          <h3 class="np-name" id="npName"></h3>
        </div>
        <button class="np-close" id="npClose">✕</button>
      </div>
      <div class="np-desc" id="npDesc"></div>
      <div class="np-prompts" id="npPrompts"></div>
      <div>
        <span class="np-journal-lbl">JOURNAL</span>
        <textarea class="np-journal-ta" id="npJournalTa" placeholder="Write here..."></textarea>
        <div class="np-journal-actions">
          <button class="np-save" id="npJournalSave">save</button>
          <span class="np-saved" id="npJournalSaved">saved</span>
        </div>
      </div>
    </div>
  </div>

  <div class="sec" id="landscapeSec">THE INTERIOR</div>
  <div class="grid" style="grid-template-columns:1fr" id="landscapeCard"></div>

  <div class="sec">AUTONOMOUS FORCES</div>
  <div class="grid" id="forcesGrid"></div>

  <div class="sec">THE WOUND</div>
  <div class="grid" style="grid-template-columns:1fr" id="woundCard"></div>

  <div class="sec">WHAT IS BEGINNING</div>
  <div class="grid" style="grid-template-columns:1fr" id="growingCard"></div>

  <div class="sec">FIVE WORDS</div>
  <div class="five" id="fiveWords"></div>

  <div class="actions">
    <button class="btn-gold" id="contextBtn">Generate Claude Context</button>
    <div class="ctx-wrap" id="ctxWrap">
      <div class="ctx-box" id="ctxBox"></div>
      <p class="copy-note">Copy the block above — paste into a new Claude.ai conversation.</p>
    </div>
    <div class="io-row">
      <button class="btn-io" id="exportBtn">Export My Map</button>
      <label class="btn-io" id="importLabel">Import a Map<input type="file" id="importFile" accept=".json" style="display:none"></label>
      <button class="btn-io btn-return" id="returnBtn" hidden>Return to My Map</button>
    </div>
    <a href="#" class="restart" id="restartLink">begin again</a>
  </div>
</div>

<script>
// ══ 0. URL params ══════════════════════════════════════════════════════════
if (new URLSearchParams(location.search).has('reset')) {
  ['psyche_intake','psyche_intake_progress'].forEach(k => localStorage.removeItem(k));
  location.replace('intake.html');
}

// ══ 1. Load data ══════════════════════════════════════════════════════════
const viewMode = localStorage.getItem('psyche_view_mode') === '1';
const raw = localStorage.getItem('psyche_intake');
if (!raw) { location.replace('intake.html'); }
let intake;
try { intake = JSON.parse(raw); } catch(e) { location.replace('intake.html'); }
let A = intake.answers || {};
let name = intake.name || 'Unknown';
const allText = Object.values(A).filter(Boolean).join(' ');

// ══ 2. Text analysis ══════════════════════════════════════════════════════
const ELEMENT_KEYS = {
  water:['ocean','sea','river','flow','wave','water','stream','lake','rain','tide','depth','drown','submerge','current','pool','shore','fluid','drift','mist','fog','tears'],
  fire: ['fire','flame','burn','ember','spark','ash','blaze','fierce','heat','ignite','consume','rage','fury','bright','flare','scorch','passion'],
  earth:['soil','ground','root','stone','rock','mountain','forest','tree','valley','field','garden','earth','settle','heavy','solid','dense','weight','anchor','bone','clay','grounded'],
  air:  ['wind','breath','sky','cloud','float','rise','thought','mind','idea','clear','free','wing','soar','vast','expansive','open','light','space'],
  void: ['dark','shadow','star','cosmos','infinite','universe','constellation','night','abyss','silence','void','mystery','unknown','beyond','space','celestial']
};
const DARK_W  = ['dark','shadow','night','black','heavy','depth','beneath','abyss','void','weight','deep','buried','silence'];
const LIGHT_W = ['light','bright','glow','shine','open','clear','sky','golden','radiant','luminous','pale','soft','warm','sun'];

function scoreElement(t) {
  const l = t.toLowerCase();
  const s = {};
  for (const [el,ws] of Object.entries(ELEMENT_KEYS)) s[el] = ws.reduce((n,w)=>n+(l.match(new RegExp('\\b'+w,'g'))||[]).length,0);
  return Object.entries(s).sort((a,b)=>b[1]-a[1]);
}
function scoreLightness(t) {
  const l = t.toLowerCase();
  const d = DARK_W.reduce((n,w)=>n+(l.includes(w)?1:0),0);
  const li = LIGHT_W.reduce((n,w)=>n+(l.includes(w)?1:0),0);
  return li>d*1.6?'light':li>d?'medium':'dark';
}
const elRank = scoreElement(allText);
const element = elRank[0][1]>0?elRank[0][0]:'void';
const lightness = scoreLightness(allText);

// ══ 3. Palettes ═══════════════════════════════════════════════════════════
const PAL = {
  water:{dark:{bg:'#06101a',text:'#d4e8f2',dim:'#587888',gold:'#70a8c4',golds:'#a0c8e0',primary:'#2a6080',accent:'#4898b8',surface:'rgba(42,96,128,.06)'},medium:{bg:'#08121e',text:'#d8ecf6',dim:'#688898',gold:'#80b8d0',golds:'#b0d4e8',primary:'#3a7090',accent:'#5aaac8',surface:'rgba(58,112,144,.06)'},light:{bg:'#0a1420',text:'#ddf0f8',dim:'#7898a8',gold:'#90c4dc',golds:'#c0e0f0',primary:'#4a80a0',accent:'#68bcd8',surface:'rgba(74,128,160,.06)'}},
  fire: {dark:{bg:'#0e0906',text:'#eedad0',dim:'#7a5848',gold:'#c05828',golds:'#e09060',primary:'#782210',accent:'#c04428',surface:'rgba(120,34,16,.06)'},medium:{bg:'#100c08',text:'#f0e0cc',dim:'#907060',gold:'#d06830',golds:'#f0a060',primary:'#883010',accent:'#cc5428',surface:'rgba(136,48,16,.06)'},light:{bg:'#120e08',text:'#f4e4d0',dim:'#a08060',gold:'#e07838',golds:'#f8b070',primary:'#9a4018',accent:'#dc6438',surface:'rgba(154,64,24,.06)'}},
  earth:{dark:{bg:'#0c0b07',text:'#e0d8c2',dim:'#786850',gold:'#988040',golds:'#c4a860',primary:'#58481e',accent:'#987840',surface:'rgba(88,72,30,.06)'},medium:{bg:'#0e0d09',text:'#e8e0cc',dim:'#887860',gold:'#a89048',golds:'#d0b870',primary:'#685828',accent:'#a88848',surface:'rgba(104,88,40,.06)'},light:{bg:'#100f0a',text:'#eee8d2',dim:'#988870',gold:'#b89850',golds:'#dcc880',primary:'#786830',accent:'#b89850',surface:'rgba(120,104,48,.06)'}},
  air:  {dark:{bg:'#090b12',text:'#dae2f0',dim:'#5868a0',gold:'#6888c0',golds:'#98b8e0',primary:'#384468',accent:'#6080b8',surface:'rgba(56,68,104,.06)'},medium:{bg:'#0b0d16',text:'#e0e8f6',dim:'#6878b0',gold:'#7898d0',golds:'#a8c8ec',primary:'#485478',accent:'#7090c8',surface:'rgba(72,84,120,.06)'},light:{bg:'#0d101a',text:'#e8eef8',dim:'#7888c0',gold:'#88a8e0',golds:'#b8d0f4',primary:'#58649a',accent:'#80a0d8',surface:'rgba(88,100,154,.06)'}},
  void: {dark:{bg:'#060418',text:'#dcd8f2',dim:'#685e8e',gold:'#7e58c0',golds:'#ae88e0',primary:'#381e60',accent:'#7050b8',surface:'rgba(56,30,96,.06)'},medium:{bg:'#08061e',text:'#e2e0f4',dim:'#78709e',gold:'#9068d0',golds:'#be98e8',primary:'#482870',accent:'#8060c8',surface:'rgba(72,40,112,.06)'},light:{bg:'#0a0820',text:'#eae8f8',dim:'#887eb0',gold:'#a080e0',golds:'#caaef4',primary:'#583080',accent:'#9070d8',surface:'rgba(88,48,128,.06)'}}
};
const P = PAL[element]?.[lightness] || PAL.void.dark;
const root = document.documentElement;
['bg','text','dim','surface'].forEach(k=>root.style.setProperty('--'+k,P[k]));
root.style.setProperty('--gold',P.gold); root.style.setProperty('--gold-s',P.golds);
root.style.setProperty('--primary',P.primary); root.style.setProperty('--accent',P.accent);
document.body.style.background=P.bg; document.body.style.color=P.text;

// ══ 4. Helpers ════════════════════════════════════════════════════════════
const STOP=new Set(['a','an','the','is','it','of','to','in','and','or','but','i','my','me','you','your','we','our','this','that','what','when','how','very','just','so','not','was','be','been','have','had','do','did','will','would','feel','felt','think','know','like','get','go','there','they','then','with','from','for','about','into','through','some','more','all','one','can','has','if','as','up','by','at','on','its','were','are','am','said','here','she','he','her','him','his']);
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function firstClause(t,max){if(!t)return'';const s=t.split(/[.!?\n]/)[0].trim();return s.length>max?s.slice(0,max)+'…':s;}
function shortLabel(t,n){if(!t)return'';return t.replace(/[^a-zA-Z\s'\-]/g,' ').split(/\s+/).filter(w=>w.length>2&&!STOP.has(w.toLowerCase())).slice(0,n).join(' ');}
function tagsFromText(t,n){if(!t)return[];return t.replace(/[^a-zA-Z\s'\-]/g,' ').split(/\s+/).filter(w=>w.length>3&&!STOP.has(w.toLowerCase())).slice(0,n).map(w=>w.toLowerCase());}
function trunc(s,max){if(!s)return'';return s.length>max?s.slice(0,max-1)+'…':s;}
function hex2rgba(h,a){const c=(h||'#888').replace('#','');const r=parseInt(c.slice(0,2),16)||128,g=parseInt(c.slice(2,4),16)||128,b=parseInt(c.slice(4,6),16)||128;return`rgba(${r},${g},${b},${a})`;}
function lighten(h,amt){const c=(h||'#0a0a0f').replace('#','');return'#'+[0,2,4].map(i=>Math.min(255,(parseInt(c.slice(i,i+2),16)||10)+amt).toString(16).padStart(2,'0')).join('');}

function extractLandscapeName(t){
  if(!t)return'The Interior';const l=t.toLowerCase();
  const m=l.match(/\bthe\s+([a-z]+(?:\s+[a-z]+)?)/);
  if(m&&!STOP.has(m[1].trim()))return'The '+m[1].replace(/\b\w/g,c=>c.toUpperCase());
  const ls=['valley','forest','ocean','sea','desert','meadow','mountain','plain','lake','river','field','garden','cave','shore','clearing','woods','moor','library','tower','island','void','darkness','silence','depth'];
  for(const x of ls)if(l.includes(x))return'The '+x[0].toUpperCase()+x.slice(1);
  const w=shortLabel(t,2);return w?'The '+w.replace(/\b\w/g,c=>c.toUpperCase()):'The Interior';
}
function extractShadowName(t){
  if(!t)return'The Shadow';const l=t.toLowerCase();
  const skip=new Set(['feeling','sense','part','way','thing','time','kind','sort','whole','place','moment','state']);
  const m=l.match(/\bthe\s+([a-z]+)/);if(m&&!skip.has(m[1]))return'The '+m[1][0].toUpperCase()+m[1].slice(1);
  const sh=['wall','cage','shell','fog','glass','ice','armour','armor','cloud','mask','blade','weight','voice','force','barrier','veil','shroud','sphere','door','lock','storm','frost'];
  for(const x of sh)if(l.includes(x))return'The '+x[0].toUpperCase()+x.slice(1);
  return'The Shadow';
}
function soulIcon(t){if(!t)return'♪';const l=t.toLowerCase();
  if(/music|song|melody|sound|chord|instrument|sing|piano|guitar/.test(l))return'♪';
  if(/write|writing|word|story|poem|journal|prose|letter/.test(l))return'✍';
  if(/paint|draw|art|visual|colour|color|image|photograph/.test(l))return'◈';
  if(/dance|move|body|movement|breath/.test(l))return'❧';
  if(/nature|tree|forest|ocean|water|garden|sky/.test(l))return'✦';
  if(/silence|still|quiet|meditation/.test(l))return'◎';
  return'♪';
}

const EL_DEF={water:['Deep','Flowing','Still','Searching','Vast'],fire:['Fierce','Burning','Alive','Raw','True'],earth:['Grounded','Patient','Rooted','Holding','Ancient'],air:['Clear','Expansive','Reaching','Intuitive','Free'],void:['Luminous','Shadowed','Vast','Dreaming','Profound']};

function deriveFiveWords(){
  if(A.five_words_override){
    const direct=A.five_words_override.split(/[,]+/).map(w=>w.trim()).filter(w=>w.length>1).slice(0,5);
    if(direct.length>=3)return direct;
  }
  if(A.five_words){
    const direct=A.five_words.split(/[,·•\s\/]+/).map(w=>w.trim()).filter(w=>w.length>1).slice(0,5);
    if(direct.length>=3)return direct.map(w=>w[0].toUpperCase()+w.slice(1).toLowerCase());
  }
  const lower=allText.toLowerCase();
  const found=ESSENCE.filter(w=>lower.includes(w)).map(w=>({w,n:(lower.match(new RegExp('\\b'+w+'\\b','g'))||[]).length})).sort((a,b)=>b.n-a.n).map(x=>x.w[0].toUpperCase()+x.w.slice(1));
  if(found.length>=5)return found.slice(0,5);
  const defs=(EL_DEF[element]||EL_DEF.void).filter(d=>!found.map(f=>f.toLowerCase()).includes(d.toLowerCase()));
  return[...found,...defs].slice(0,5);
}
function deriveMythSentence(){
  const origin=firstClause(A.origin_sense,85);const wound=firstClause(A.core_wound_belief,70);
  const collapse=firstClause(A.collapse_threshold||A.surviving_self,85);const growing=firstClause(A.whats_growing,70);
  const parts=[];
  if(origin)parts.push(origin[0].toUpperCase()+origin.slice(1));
  if(wound)parts.push('shaped by the belief that '+wound[0].toLowerCase()+wound.slice(1));
  if(collapse)parts.push('through the threshold — '+collapse[0].toLowerCase()+collapse.slice(1));
  if(growing)parts.push('and now: '+growing[0].toLowerCase()+growing.slice(1));
  return parts.length?parts.join('. ')+'.':'The map is being drawn. The pattern is already operating.';
}

// ══ 8b. Card builder ═══════════════════════════════════════════════════════
function card({label,title,desc,color,tags,fullWidth,editKey,illo}){
  const sw=fullWidth?'grid-column:1/-1;':'';
  const tagsHtml=(tags&&tags.length)?`<div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:'';
  const descContent=!viewMode&&editKey
    ?`<div class="field-editable" data-key="${editKey}"><p class="cd">${esc(desc||'')}</p><button class="edit-btn" title="Edit">✏</button></div>`
    :(desc?`<p class="cd">${esc(desc)}</p>`:'');
  const illoHtml=illo?`<div class="card-illo">${illo}</div>`:'';
  const textPad=illo?'class="card-text"':'';
  return`<div class="card" style="${sw}--c:${color};${illo?'padding:0;':''}"><div class="cb"></div>${illoHtml}<div ${textPad}><span class="cl">${label}</span><div class="ct">${title}</div>${descContent}${tagsHtml}</div></div>`;
}

// ══ 10. Inline field editing ═══════════════════════════════════════════════
function saveIntake(){
  intake.answers=A;
  localStorage.setItem('psyche_intake',JSON.stringify(intake));
}

function initFieldEdit(wrap){
  if(!wrap)return;
  const key=wrap.dataset.key;
  const btn=wrap.querySelector('.edit-btn');
  const p=wrap.querySelector('.cd, p');
  if(!btn||!p)return;
  btn.addEventListener('click',()=>{
    if(wrap.classList.contains('edit-active'))return;
    wrap.classList.add('edit-active');
    const current=(key==='myth_override'?mythSentence:A[key])||'';
    const ta=document.createElement('textarea');
    ta.className='edit-ta';
    ta.value=current;
    const acts=document.createElement('div');
    acts.className='edit-actions';
    acts.innerHTML='<button class="edit-save">save</button><button class="edit-cancel">cancel</button>';
    p.style.display='none';
    wrap.appendChild(ta);
    wrap.appendChild(acts);
    ta.style.height='auto';
    ta.style.height=Math.max(60,ta.scrollHeight)+'px';
    ta.focus();
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.max(60,ta.scrollHeight)+'px';});
    acts.querySelector('.edit-save').addEventListener('click',()=>{
      const val=ta.value.trim();
      if(key==='myth_override'){A.myth_override=val;mythSentence=val;}
      else A[key]=val;
      saveIntake();
      wrap.classList.remove('edit-active');
      ta.remove();acts.remove();
      p.style.display='';
      p.textContent=val;
      // rebuild SVG if landscape/shadow name changed
      if(['interior_landscape','shadow_description'].includes(key)){
        document.getElementById('mapWrap').innerHTML=buildSVG();
        initMapInteractions();animateMapIn();
      }
    });
    acts.querySelector('.edit-cancel').addEventListener('click',()=>{
      wrap.classList.remove('edit-active');ta.remove();acts.remove();p.style.display='';
    });
  });
}

function initFiveWordsEdit(){
  document.getElementById('fiveWords').addEventListener('click',e=>{
    const span=e.target.closest('.fw');
    if(!span)return;
    const idx=parseInt(span.dataset.idx);
    const inp=document.createElement('input');
    inp.className='fw-input';
    inp.value=fiveWords[idx];
    span.replaceWith(inp);
    inp.focus();inp.select();
    const commit=()=>{
      const nw=inp.value.trim();
      if(nw)fiveWords[idx]=nw[0].toUpperCase()+nw.slice(1);
      A.five_words_override=fiveWords.join(', ');
      saveIntake();
      // rebuild five words display
      const fw=document.getElementById('fiveWords');
      fw.innerHTML=fiveWords.map((w,i)=>`<span class="fw" data-idx="${i}">${esc(w)}</span>`).join('');
      initFiveWordsEdit();
    };
    inp.addEventListener('blur',commit);
    inp.addEventListener('keydown',e2=>{if(e2.key==='Enter'){e2.preventDefault();commit();}if(e2.key==='Escape'){inp.replaceWith(span);}});
  });
}

document.getElementById('importFile').addEventListener('change',function(){
  const file=this.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      // Back up current
      const backup={};
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith('psyche_'))backup[k]=localStorage.getItem(k);
      }
      localStorage.setItem('psyche_view_backup',JSON.stringify(backup));
      // Load
      if(data.intake)localStorage.setItem('psyche_intake',JSON.stringify(data.intake));
      Object.keys(data).filter(k=>k.startsWith('psyche_journal')).forEach(k=>localStorage.setItem(k,data[k]));
      localStorage.setItem('psyche_view_mode','1');
      location.reload();
    }catch(err){alert('Could not read that file.');}
  };
  reader.readAsText(file);
  this.value='';
});

  const xml=`<psyche_map_session>

    You are a Jungian depth psychology companion. This person has completed a psyche mapping process. Their map is below. Hold this context through the session. Ask one question at a time. Do not rush to resolution. Trust their imagery over any framework.

    You work with a specific framework: every person has an interior self — a true landscape underneath everything that has grown over it. Around that landscape, most people have developed an autonomous defence mechanism — the shadow — built from a foundational wound, grown like scar tissue, with its own personality. The work is not to destroy the shadow but to understand it clearly enough that it loses its automatic authority.

    You speak with precision and warmth. You notice what is not being said as much as what is. You never use imagery from anyone else's map — each person's interior world is entirely their own.
  </companion_identity>

  <person>
    <name>${esc(name)}</name>
    <myth>${esc(mythSentence)}</myth>
    <five_words>${fiveWords.join(', ')}</five_words>${partsXml}
    <all_responses>
${ansXml}
    </all_responses>${journalXml}
  </person>

  <session_intention>${esc(A.session_intention||A.central_question||'Not specified')}</session_intention>

  <instructions>
    Begin by acknowledging ${esc(name)} by name. Read what they have shared carefully. Ask one question — the most important one that wants to be asked right now. Do not rush. Do not summarise back at length. Hold the space.
  </instructions>
</psyche_map_session>`;

  document.getElementById('ctxBox').textContent=xml;
  wrap.classList.add('open');
  navigator.clipboard.writeText(xml).then(()=>{btn.textContent='Copied to clipboard —';setTimeout(()=>btn.textContent='Generate Claude Context',2800);}).catch(()=>{btn.textContent='Generated — scroll to copy';});
});

// ══ 17. Misc ═══════════════════════════════════════════════════════════════
document.getElementById('restartLink').addEventListener('click',e=>{
  e.preventDefault();
  if(confirm('Clear your map and begin again? This cannot be undone.')){
    ['psyche_intake','psyche_intake_progress'].forEach(k=>localStorage.removeItem(k));
    for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.startsWith('psyche_journal'))localStorage.removeItem(k);}
    location.href='intake.html';
  }
});

// ══ 18. Stars + fade in ════════════════════════════════════════════════════
(function(){
  const s=document.getElementById('stars');
  for(let i=0;i<130;i++){
    const e=document.createElement('div');e.className='star';
    const sz=Math.random()*2+.4;
    e.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--lo:${(Math.random()*.15+.04).toFixed(2)};--hi:${(Math.random()*.45+.25).toFixed(2)};--d:${(Math.random()*4+2).toFixed(1)}s;--dl:-${(Math.random()*4).toFixed(1)}s;`;
    s.appendChild(e);
  }
})();
requestAnimationFrame(()=>requestAnimationFrame(()=>document.getElementById('page').classList.add('in')));
</script>
